spring.application.name=user-service
server.port=8089

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:usersdb}
spring.datasource.hikari.data-source-properties.DATABASE_TO_UPPER=false
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}


spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Tell Flyway to create tables in the default PUBLIC schema
spring.flyway.schemas=PUBLIC
# spring.flyway.schemas=user_service
spring.flyway.create-schemas=true
spring.flyway.table=flyway_schema_history_user_service

# Tell Hibernate to use the same schema
spring.jpa.properties.hibernate.default_schema=PUBLIC
# spring.jpa.properties.hibernate.default_schema=user_service

# Optional: let Hibernate create/drop tables automatically for dev
# spring.jpa.hibernate.ddl-auto=update

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false
spring.h2.console.settings.web-allow-others=true

# spring.datasource.url=jdbc:h2:mem:usersdb;DATABASE_TO_UPPER=false