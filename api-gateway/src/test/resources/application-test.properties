# Enable gateway
spring.cloud.gateway.enabled=true

# Disable discovery (important)
spring.cloud.gateway.discovery.locator.enabled=false

# Disable security
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.oauth2.resource.reactive.ReactiveOAuth2ResourceServerAutoConfiguration

# Disable swagger
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Dummy JWT config
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://dummy

# Allow overrides
spring.main.allow-bean-definition-overriding=true