# ---------------------------------------------------
# Minimal test configuration for api-gateway unit tests
# ---------------------------------------------------

# Dummy JWT secret for tests
spring.security.oauth2.resourceserver.jwt.secret-key=dummysecret

# Enable Spring Cloud Gateway
spring.cloud.gateway.enabled=true

# Disable service discovery
spring.cloud.gateway.discovery.locator.enabled=false

# Disable security completely
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.oauth2.resource.reactive.ReactiveOAuth2ResourceServerAutoConfiguration

# Disable Swagger / OpenAPI docs
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Dummy JWT configuration (required by security beans)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://dummy

# Allow bean overrides to prevent conflicts
spring.main.allow-bean-definition-overriding=true

# -----------------------------
# Dummy service URLs / placeholders
# Must match any placeholders in your GatewayRoutingConfig
# -----------------------------
COURSES_SERVICE_URL=http://localhost:9999
TASKS_SERVICE_URL=http://localhost:9999
courses.service.path=/api/v1/courses/**
tasks.service.path=/api/v1/tasks/**

# -----------------------------
# Minimal gateway routes for test
# -----------------------------
spring.cloud.gateway.routes[0].id=test-courses
spring.cloud.gateway.routes[0].uri=http://localhost:9999
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/courses/**
spring.cloud.gateway.routes[1].id=test-tasks
spring.cloud.gateway.routes[1].uri=http://localhost:9999
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/tasks/**